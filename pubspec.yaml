name: routo_app
description: Routo - Smart Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies: 
  shimmer: ^3.0.0
  lottie: ^3.1.0  
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_auth_platform_interface: ^7.7.3
  intl: ^0.20.2
  image_picker: ^1.2.1
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.2
  # Google Maps — covers Android + Web (google_maps_flutter_web is auto-included)
  google_maps_flutter: ^2.9.0
  flutter_polyline_points: ^2.1.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/routo_logo.png
    - assets/images/google.png
    - assets/google.png
    - assets/animations/delivery.json