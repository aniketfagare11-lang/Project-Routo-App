<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Routo – Smart Route Delivery">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Routo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id"
    content="547297166217-92vllrd37bhq9pa6v8oo7njell3p4lgc.apps.googleusercontent.com">

  <title>Routo</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <!-- Firebase reCAPTCHA container – must exist in DOM before RecaptchaVerifier is created -->
  <div id="recaptcha-container"></div>

  <!-- gm_authFailure — MUST be defined BEFORE the Maps script loads.         -->
  <!-- Catches ApiNotActivatedMapError / RefererNotAllowedMapError /           -->
  <!-- BillingNotEnabledMapError and removes the "Oops!" overlay,             -->
  <!-- letting Flutter show its own graceful fallback UI instead.             -->
  <script>
    window.gm_authFailure = function () {
      window.__gm_auth_failed = true;
      function cleanMapErrors() {
        ['.gm-err-container', '.gm-err-autocomplete-container',
          '.gm-err-message', '.dismissButton'].forEach(function (sel) {
            document.querySelectorAll(sel).forEach(function (el) {
              if (el.parentNode) el.parentNode.removeChild(el);
            });
          });
      }
      cleanMapErrors();
      setTimeout(cleanMapErrors, 200);
      setTimeout(cleanMapErrors, 800);
    };
  </script>

  <!-- Load local environment variables (This file is git-ignored) -->
  <script src="env.js"></script>

  <!-- Google Maps JavaScript API (Dynamically Injected) -->
  <script>
    if (window.MAPS_API_KEY) {
      var script = document.createElement('script');
      script.src = "https://maps.googleapis.com/maps/api/js?key=" + window.MAPS_API_KEY + "&libraries=geometry,places";
      document.head.appendChild(script);
    } else {
      console.error("MAPS_API_KEY is missing from env.js!");
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
